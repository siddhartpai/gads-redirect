<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobha Neopolis — Connecting you</title>
<style>
  :root {
    --ink: #1a2e23;
    --paper: #f6f3ec;
    --wa: #25d366;
    --wa-deep: #128c7e;
    --muted: #6b7d72;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at 50% 30%, #ffffff 0%, var(--paper) 70%);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 420px;
    width: 100%;
  }
  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  h1 {
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .sub {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 38px;
  }
  /* Countdown ring */
  .ring-wrap {
    position: relative;
    width: 150px;
    height: 150px;
    margin: 0 auto 36px;
  }
  svg { transform: rotate(-90deg); }
  .track { stroke: #e3ddd0; }
  .progress {
    stroke: var(--wa);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }
  .count {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.4rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--wa);
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    padding: 14px 26px;
    border-radius: 999px;
    box-shadow: 0 8px 24px rgba(37,211,102,0.35);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .btn:hover { background: var(--wa-deep); transform: translateY(-1px); }
  .btn:focus-visible { outline: 3px solid var(--wa-deep); outline-offset: 3px; }
  .btn svg { transform: none; }
  @media (prefers-reduced-motion: reduce) {
    .progress { transition: none; }
  }
</style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Sobha Neopolis</p>
    <h1>Connecting you to our team</h1>
    <p class="sub">Opening WhatsApp with your enquiry…</p>

    <div class="ring-wrap" role="timer" aria-live="polite">
      <svg width="150" height="150" viewBox="0 0 150 150">
        <circle class="track" cx="75" cy="75" r="68" fill="none" stroke-width="8"/>
        <circle id="progress" class="progress" cx="75" cy="75" r="68" fill="none" stroke-width="8"/>
      </svg>
      <div class="count" id="count">3</div>
    </div>

    <a class="btn" id="go" href="#">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff">
        <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2Zm0 18.13a8.23 8.23 0 0 1-4.2-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.2 8.2 0 0 1-1.26-4.38c0-4.54 3.7-8.23 8.25-8.23 2.2 0 4.27.86 5.82 2.42a8.18 8.18 0 0 1 2.41 5.82c0 4.54-3.7 8.24-8.24 8.24Zm4.52-6.16c-.25-.12-1.47-.72-1.69-.81-.23-.08-.39-.12-.56.13-.16.25-.64.81-.78.97-.15.17-.29.19-.54.06-.25-.12-1.05-.39-1.99-1.23-.74-.66-1.23-1.47-1.38-1.72-.14-.25-.01-.38.11-.51.11-.11.25-.29.37-.43.13-.15.17-.25.25-.42.08-.17.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.4-.42-.56-.43h-.48c-.17 0-.43.06-.66.31-.23.25-.86.85-.86 2.07 0 1.22.89 2.4 1.01 2.56.12.17 1.75 2.67 4.23 3.74.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.47-.6 1.67-1.18.21-.58.21-1.07.15-1.18-.06-.11-.22-.17-.47-.29Z"/>
      </svg>
      Go to WhatsApp now
    </a>
  </main>

<script>
  var WHATSAPP_URL = "https://api.whatsapp.com/send?phone=917022136920&text=I%E2%80%99d%20like%20to%20know%20about%20Sobha%20Neopolis%20";
  document.getElementById('go').setAttribute('href', WHATSAPP_URL);

  var total = 3;
  var remaining = total;
  var countEl = document.getElementById('count');
  var ring = document.getElementById('progress');
  var R = 68;
  var C = 2 * Math.PI * R;
  ring.style.strokeDasharray = C;
  ring.style.strokeDashoffset = 0;

  var timer = setInterval(function () {
    remaining--;
    if (remaining <= 0) {
      countEl.textContent = '0';
      ring.style.strokeDashoffset = C;
      clearInterval(timer);
      window.location.href = WHATSAPP_URL;
      return;
    }
    countEl.textContent = remaining;
    ring.style.strokeDashoffset = C * ((total - remaining) / total);
  }, 1000);
</script>
</body>
</html>
